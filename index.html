<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#191919;--surface:#212121;--border:#2e2e2e;
    --text:#e2e2dc;--text2:#8a8a86;--text3:#4e4e4b;
    --r:7px;--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{background:var(--bg)}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  ::-webkit-scrollbar{width:0;background:transparent}
  .widget{width:100%;padding:14px 14px 12px}

  /* header */
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .hl{display:flex;align-items:baseline;gap:8px}
  .htitle{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-.01em}
  .hdate{font-family:var(--mono);font-size:11px;color:var(--text3)}
  .hr{display:flex;align-items:center;gap:6px}
  .pdot{width:6px;height:6px;border-radius:50%;background:#4caf8a;animation:blink 2.4s ease infinite;flex-shrink:0}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

  /* auth */
  .auth{padding:20px 14px;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px}
  .atitle{font-size:14px;font-weight:600;margin-bottom:4px}
  .asub{font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.6}
  .abtn{display:inline-flex;align-items:center;gap:7px;background:var(--text);color:#191919;font-family:var(--font);font-size:13px;font-weight:600;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;transition:opacity .15s}
  .abtn:hover{opacity:.85}

  /* notion config */
  .ncfg{padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-top:12px}
  .ncfg label{display:block;font-size:11px;color:var(--text3);margin-bottom:4px}
  .ncfg input{width:100%;padding:6px 8px;margin-bottom:10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px}
  .ncfg input::placeholder{color:var(--text3)}
  .ncfg .abtn{margin-top:4px}

  /* section label */
  .slabel{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;margin-top:12px;padding-left:1px}
  .slabel:first-child{margin-top:0}

  /* cards */
  .list{display:flex;flex-direction:column;gap:3px}
  .card{display:flex;align-items:stretch;gap:10px;padding:9px 11px 9px 13px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);position:relative;overflow:hidden;transition:border-color .12s,background .12s;animation:up .22s ease both;cursor:pointer;text-decoration:none;color:inherit}
  @keyframes up{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .card:hover{border-color:#383838;background:#232323}
  .card::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:3px;border-radius:0 2px 2px 0;background:var(--c,#4caf8a)}
  .card.now{border-color:color-mix(in srgb,var(--c,#4caf8a) 30%,var(--border));background:color-mix(in srgb,var(--c,#4caf8a) 6%,var(--surface))}

  .tc{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;min-width:46px;flex-shrink:0;gap:1px}
  .ts{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text);line-height:1}
  .te{font-family:var(--mono);font-size:10px;color:var(--text3);line-height:1}
  .ta{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.05em;text-transform:uppercase}

  .vl{width:1px;background:var(--border);align-self:stretch;flex-shrink:0}

  .bc{flex:1;min-width:0}
  .etop{display:flex;align-items:flex-start;justify-content:space-between;gap:5px;margin-bottom:2px}
  .en{font-size:13px;font-weight:500;color:var(--text);line-height:1.3;word-break:break-word}
  .npill{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--c,#4caf8a);background:color-mix(in srgb,var(--c,#4caf8a) 14%,transparent);border:1px solid color-mix(in srgb,var(--c,#4caf8a) 28%,transparent);padding:2px 5px;border-radius:3px;white-space:nowrap;flex-shrink:0;margin-top:1px}
  .cr{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3)}
  .cd{width:5px;height:5px;border-radius:50%;background:var(--c,#4caf8a);flex-shrink:0}

  .meta{display:flex;flex-direction:column;gap:3px;margin-top:5px}
  .mr{display:flex;align-items:flex-start;gap:5px;font-size:11px;color:var(--text2);line-height:1.4}
  .mr svg{flex-shrink:0;margin-top:1px;opacity:.6}
  .mr a{color:#6fa8dc;text-decoration:none;word-break:break-all}
  .mr a:hover{text-decoration:underline}

  /* materia tag */
  .mtag{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:3px;margin-top:4px;letter-spacing:.02em}

  /* skeleton */
  .sk{display:flex;gap:9px;padding:9px 11px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:3px}
  .sb{background:linear-gradient(90deg,#242424 25%,#2d2d2d 50%,#242424 75%);background-size:200% 100%;border-radius:4px;animation:sh 1.3s infinite}
  @keyframes sh{to{background-position:-200% 0}}

  /* empty */
  .empty{padding:20px 14px;text-align:center;color:var(--text2);font-size:13px}

  /* footer */
  .foot{margin-top:8px;font-family:var(--mono);font-size:9px;color:var(--text3);text-align:right}
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <div class="hl">
      <span class="htitle">Hoje</span>
      <span class="hdate" id="hd"></span>
    </div>
    <div class="hr">
      <div class="pdot" id="dot" style="display:none"></div>
    </div>
  </div>

  <div id="authWrap">
    <div class="auth">
      <div class="atitle">Conectar Google Calendar</div>
      <div class="asub">Entre com sua conta Google para<br>ver os eventos do dia.</div>
      <button class="abtn" onclick="handleAuth()">
        <svg width="14" height="14" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Entrar com Google
      </button>
    </div>
  </div>

  <div id="evWrap" style="display:none">
    <div id="gcalSection"></div>
    <div id="notionSection"></div>
    <div class="foot" id="foot"></div>
  </div>
</div>

<script>
// ── CONFIG ──
const CLIENT_ID   = "838721119147-oret5s51b8hphal1k3a7sqfgor92n7de.apps.googleusercontent.com";
const API_KEY     = "AIzaSyARIwd1JUpy40i4M6xMkpHb42-rvt4OoWE";
// Notion: token e ID da base ficam no localStorage (configure uma vez na seção Notion)
function getNotionConfig(){ return { token: localStorage.getItem("notion_token")||"", db: localStorage.getItem("notion_db")||"" }; }
const SCOPES      = "https://www.googleapis.com/auth/calendar.readonly";
const DISC        = "https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest";
const REFRESH     = 20;

// Google Calendar colors
const GC={"1":"#a4bdfc","2":"#7ae7bf","3":"#dbadff","4":"#ff887c","5":"#fbd75b","6":"#ffb878","7":"#46d6db","8":"#e1e1e1","9":"#5484ed","10":"#51b749","11":"#dc2127"};
const NC={"organização":"#5484ed","tcc":"#51b749","otag":"#7ae7bf","omog":"#a4bdfc","estágio bmw":"#ff887c","estágio":"#ff887c","rotina":"#fbd75b","eventos":"#46d6db","submissões":"#46d6db","feriados":"#888"};

// Notion Matéria colors
const MATERIA_COLORS = {
  "TCC":                          { bg:"rgba(81,183,73,0.15)",  border:"rgba(81,183,73,0.4)",   text:"#7ed67a" },
  "OTAG":                         { bg:"rgba(84,132,237,0.15)", border:"rgba(84,132,237,0.4)",  text:"#7aaaf5" },
  "OMOG":                         { bg:"rgba(163,107,237,0.15)",border:"rgba(163,107,237,0.4)", text:"#c58fff" },
  "Estágio":                  { bg:"rgba(220,33,39,0.15)",  border:"rgba(220,33,39,0.4)",   text:"#f07070" },
  "Rotina":                       { bg:"rgba(255,184,120,0.15)",border:"rgba(255,184,120,0.4)", text:"#ffb878" },
  "Eventos e Submissões de Artigos":{ bg:"rgba(220,220,220,0.1)", border:"rgba(220,220,220,0.3)", text:"#d0d0cc" },
};
// strip color for left bar
const MATERIA_BAR = {
  "TCC":"#51b749","OTAG":"#5484ed","OMOG":"#a36bed",
  "Estágio":"#dc2127","Rotina":"#ffb878",
  "Eventos e Submissões de Artigos":"#e1e1e1"
};
// Feriados e Home Office — sempre verde
const FERIADOS_HO_STYLE = { bg:"rgba(34,197,94,0.15)", border:"rgba(34,197,94,0.4)", text:"#4ade80" };
const FERIADOS_HO_BAR = "#22c55e";

let tokenClient, gOk=false, gsOk=false, timer=null, cd=REFRESH;

// ── GAPI ──
function gapiLoaded(){
  gapi.load("client",async()=>{
    await gapi.client.init({apiKey:API_KEY,discoveryDocs:[DISC]});
    gOk=true;boot();
  });
}
function gisLoaded(){
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,scope:SCOPES,
    callback:r=>{if(!r.error)signedIn();}
  });
  gsOk=true;boot();
}
function boot(){
  if(!gOk||!gsOk)return;
  const s=localStorage.getItem("gct");
  if(s){gapi.client.setToken(JSON.parse(s));signedIn();}
}
function handleAuth(){tokenClient.requestAccessToken({prompt:""});}
function signedIn(){
  const t=gapi.client.getToken();
  if(t)localStorage.setItem("gct",JSON.stringify(t));
  document.getElementById("authWrap").style.display="none";
  document.getElementById("evWrap").style.display="block";
  document.getElementById("dot").style.display="block";
  loadAll();startCycle();
}
function startCycle(){
  clearInterval(timer);cd=REFRESH;
  timer=setInterval(()=>{cd--;if(cd<=0){cd=REFRESH;loadAll();}},1000);
}
function loadAll(){
  loadGcal();
  loadNotion();
}

// ── GCAL ──
async function loadGcal(){
  const sec=document.getElementById("gcalSection");
  try{
    const cals=(await gapi.client.calendar.calendarList.list({minAccessRole:"reader"})).result.items||[];
    const now=new Date();
    const s=new Date(now);s.setHours(0,0,0,0);
    const e=new Date(now);e.setHours(23,59,59,999);
    const all=await Promise.all(cals.map(cal=>
      gapi.client.calendar.events.list({calendarId:cal.id,timeMin:s.toISOString(),timeMax:e.toISOString(),singleEvents:true,orderBy:"startTime",maxResults:50})
      .then(r=>(r.result.items||[]).map(ev=>{ev._cal=cal.summary||cal.id;ev._color=rc(cal,ev);ev._gcalId=cal.id;return ev;}))
      .catch(()=>[])
    ));
    const evs=all.flat().sort((a,b)=>{const ta=a.start.dateTime||a.start.date,tb=b.start.dateTime||b.start.date;return ta<tb?-1:ta>tb?1:0;});
    renderGcal(evs,now);
    document.getElementById("foot").textContent="atualizado "+now.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  }catch(err){
    if(err.status===401){localStorage.removeItem("gct");document.getElementById("authWrap").style.display="block";document.getElementById("evWrap").style.display="none";}
    else sec.innerHTML=`<div class="empty">Erro ao carregar Google Calendar.</div>`;
  }
}

function renderGcal(evs,now){
  const sec=document.getElementById("gcalSection");
  let html=`<div class="slabel">Google Calendar</div><div class="list">`;
  if(!evs.length){
    html+=`<div class="empty">Nenhum evento hoje</div>`;
  } else {
    html+=evs.map((ev,i)=>{
      const c=ev._color,isN=hp(ev,now),ad=!ev.start.dateTime;
      const s=ad?null:ft(ev.start.dateTime),e=ad?null:ft(ev.end.dateTime);
      const meet=ev.hangoutLink||vlink(ev);
      const att=(ev.attendees||[]).filter(a=>!a.self&&a.email);
      const href=ev.htmlLink||`https://calendar.google.com/calendar/r`;
      return `<a class="card${isN?" now":""}" style="--c:${c};animation-delay:${i*.04}s" href="${href}" target="_blank" rel="noopener">
  <div class="tc">${ad?`<span class="ta">dia<br>todo</span>`:`<span class="ts">${s}</span><span class="te">${e}</span>`}</div>
  <div class="vl"></div>
  <div class="bc">
    <div class="etop"><div class="en">${esc(ev.summary||"Sem título")}</div>${isN?`<span class="npill">agora</span>`:""}</div>
    <div class="cr"><span class="cd"></span>${esc(ev._cal)}</div>
    ${att.length||meet?`<div class="meta">
      ${att.length?`<div class="mr"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>${att.slice(0,3).map(a=>esc(a.displayName||a.email)).join(", ")}${att.length>3?` +${att.length-3}`:""}</div>`:""}
      ${meet?`<div class="mr"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg><span style="color:#6fa8dc">Entrar na chamada →</span></div>`:""}
    </div>`:""}
  </div>
</a>`;
    }).join("");
  }
  html+=`</div>`;
  sec.innerHTML=html;
}

// ── NOTION ──
function saveNotionConfig(){
  const token=(document.getElementById("notion_token_input")||{}).value||"";
  const db=(document.getElementById("notion_db_input")||{}).value||"";
  if(token)localStorage.setItem("notion_token",token.trim());
  if(db)localStorage.setItem("notion_db",db.trim());
  loadNotion();
}
async function loadNotion(){
  const sec=document.getElementById("notionSection");
  const { token: NOTION_TOKEN, db: NOTION_DB } = getNotionConfig();
  if(!NOTION_TOKEN||!NOTION_DB){
    sec.innerHTML=`<div class="slabel">Organização (Notion)</div><div class="ncfg">
      <label>Token da API Notion (Integrations)</label><input type="password" id="notion_token_input" placeholder="ntn_..." autocomplete="off">
      <label>ID da base (da URL da base no Notion)</label><input type="text" id="notion_db_input" placeholder="30e907f893f2...">
      <button class="abtn" onclick="saveNotionConfig()">Salvar e carregar</button>
    </div>`;
    return;
  }
  try{
    const now=new Date();
    const todayStr=now.toLocaleDateString("sv-SE",{timeZone:"America/Sao_Paulo"});

    const resp=await fetch(`https://noisy-king-6a8.capitanileticiats.workers.dev/v1/databases/${NOTION_DB}/query`,{
      method:"POST",
      headers:{
        "Authorization":`Bearer ${NOTION_TOKEN}`,
        "Notion-Version":"2022-06-28",
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        filter:{
          and:[
            {property:"Data",date:{on_or_after:todayStr}},
            {property:"Data",date:{on_or_before:todayStr}}
          ]
        },
        sorts:[{property:"Data",direction:"ascending"}]
      })
    });

    if(!resp.ok) throw new Error("Notion API error "+resp.status);
    const data=await resp.json();
    const pages=data.results||[];
    renderNotion(pages,now);
  }catch(err){
    sec.innerHTML=`<div class="slabel">Organização (Notion)</div><div class="empty">Erro ao carregar Notion: ${esc(err.message)}</div>`;
  }
}

function renderNotion(pages,now){
  const sec=document.getElementById("notionSection");
  let html=`<div class="slabel">Organização · Notion</div><div class="list">`;

  if(!pages.length){
    html+=`<div class="empty">Nenhum evento hoje</div>`;
  } else {
    html+=pages.map((page,i)=>{
      const props=page.properties;
      // title
      const titleArr=props.Nome?.title||props.Name?.title||props.Título?.title||[];
      const title=titleArr.map(t=>t.plain_text).join("")||"Sem título";
      // date
      const dateProp=props.Data?.date;
      const startDT=dateProp?.start;
      const endDT=dateProp?.end;
      const allDay=startDT&&!startDT.includes("T");
      const s=allDay?null:ft(startDT);
      const e=endDT?(allDay?null:ft(endDT)):null;
      // materia tag
      const materiaOpts=props["Matéria"]?.multi_select||props["Materia"]?.multi_select||props["Matéria"]?.select?[props["Matéria"].select]:[];
      const materia=materiaOpts.length?materiaOpts[0].name:null;
      const mStyle=materia&&MATERIA_COLORS[materia]?MATERIA_COLORS[materia]:null;
      const barColor=materia&&MATERIA_BAR[materia]?MATERIA_BAR[materia]:"#888";
      // Feriados e Home Office (verde)
      const feriadosOpts=props["Feriados e Home Office"]?.multi_select||props["Feriados e Home Office"]?.select?[props["Feriados e Home Office"].select]:[];
      const feriadosHo=feriadosOpts.length?feriadosOpts[0].name:null;
      const barColorFinal=feriadosHo?FERIADOS_HO_BAR:barColor;
      // notion page url
      const pageUrl=`https://notion.so/${page.id.replace(/-/g,"")}`;
      // is happening now
      const isN=startDT&&!allDay?hp({start:{dateTime:startDT},end:{dateTime:endDT||startDT}},now):false;

      return `<a class="card${isN?" now":""}" style="--c:${barColorFinal};animation-delay:${i*.04}s" href="${pageUrl}" target="_blank" rel="noopener">
  <div class="tc">${allDay?`<span class="ta">dia<br>todo</span>`:`<span class="ts">${s}</span>${e?`<span class="te">${e}</span>`:""}`}</div>
  <div class="vl"></div>
  <div class="bc">
    <div class="etop"><div class="en">${esc(title)}</div>${isN?`<span class="npill">agora</span>`:""}</div>
    ${materia?`<div>${mStyle?`<span class="mtag" style="background:${mStyle.bg};border:1px solid ${mStyle.border};color:${mStyle.text}">${esc(materia)}</span>`:`<span class="mtag" style="background:rgba(128,128,128,0.15);border:1px solid rgba(128,128,128,0.3);color:#888">${esc(materia)}</span>`}</div>`:""}
    ${feriadosHo?`<div>${feriadosHo?`<span class="mtag" style="background:${FERIADOS_HO_STYLE.bg};border:1px solid ${FERIADOS_HO_STYLE.border};color:${FERIADOS_HO_STYLE.text}">${esc(feriadosHo)}</span>`:""}</div>`:""}
  </div>
</a>`;
    }).join("");
  }
  html+=`</div>`;
  sec.innerHTML=html;
}

// ── HELPERS ──
function rc(cal,ev){if(ev.colorId)return GC[ev.colorId]||"#888";if(cal.backgroundColor)return cal.backgroundColor;const k=(cal.summary||"").toLowerCase();for(const[n,v]of Object.entries(NC))if(k.includes(n))return v;return"#888";}
function hp(ev,now){if(!ev.start.dateTime)return false;return now>=new Date(ev.start.dateTime)&&now<=new Date(ev.end||{dateTime:ev.start.dateTime}.dateTime);}
function ft(dt){return new Date(dt).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});}
function vlink(ev){const d=(ev.description||"")+(ev.location||"");const m=d.match(/https?:\/\/[^\s"<>]*(meet\.google|zoom\.us|teams\.microsoft|meet\.jit\.si)[^\s"<>]*/i);return m?m[0]:null;}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// header date
document.getElementById("hd").textContent=new Date().toLocaleDateString("pt-BR",{weekday:"short",day:"numeric",month:"short"});
window.gapiLoaded=gapiLoaded;
window.gisLoaded=gisLoaded;
</script>
<script src="https://apis.google.com/js/api.js?onload=gapiLoaded" defer></script>
<script src="https://accounts.google.com/gsi/client" onload="gisLoaded()" defer></script>
</body>
</html>
